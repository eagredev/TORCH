<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TORCH Studio</title>
  <link rel="stylesheet" href="pico.min.css">
  <link rel="stylesheet" href="torch.css">
</head>
<body>
  <nav>
    <div class="nav-header">
      <strong class="torch-brand">TORCH</strong>
      <button class="nav-collapse-toggle" title="Collapse sidebar" aria-label="Collapse sidebar">&#10094;</button>
    </div>
    <img class="nav-mascot" id="nav-mascot" src="/api/sprites/torchic/anim_front.png" alt="">
    <button class="mobile-menu-toggle" aria-label="Menu">&#9776;</button>
    <div class="nav-links">
      <a href="#/" class="nav-link" data-route="/" data-icon="&#9632;" title="Dashboard"><span class="nav-label">Dashboard</span></a>
      <a href="#/studio" class="nav-link" data-route="/studio" data-icon="&#9998;" title="Studio"><span class="nav-label">Studio</span></a>
      <a href="#/ide" class="nav-link" data-route="/ide" style="display:none"></a>
      <a href="#/templates" class="nav-link" data-route="/templates" data-icon="&#9962;" title="Templates"><span class="nav-label">Templates</span></a>
      <a href="#/npcs" class="nav-link" data-route="/npcs" data-icon="&#9786;" title="NPCs"><span class="nav-label">NPCs</span></a>
      <a href="#/dex" class="nav-link" data-route="/dex" data-icon="&#9733;" title="Dex"><span class="nav-label">Dex</span></a>
      <div class="nav-separator"></div>
      <a href="#/settings" class="nav-link" data-route="/settings" data-icon="&#9881;" title="Settings"><span class="nav-label">Settings</span></a>
      <a href="#/project" class="nav-link" data-route="/project" data-icon="&#9871;" title="Project"><span class="nav-label">Project</span></a>
      <a href="#/versions" class="nav-link" data-route="/versions" data-icon="&#9776;" title="Versions"><span class="nav-label">Versions</span></a>
    </div>
    <div class="nav-right">
      <button class="nav-build" onclick="fetch('/api/build',{method:'POST'})"><span class="nav-label">Build</span></button>
      <div class="theme-switcher">
        <button class="theme-dot torch-dot active" data-theme="torch" title="Torch"></button>
        <button class="theme-dot porygon-dot" data-theme="porygon" title="Pory"></button>
        <button class="theme-dot rayquaza-dot" data-theme="rayquaza" title="Emerald"></button>
      </div>
      <a class="nav-quit" href="#" onclick="fetch('/api/shutdown',{method:'POST'}).then(()=>window.close());return false">quit</a>
      <button class="nav-layout-toggle" title="Toggle sidebar/top bar layout">&#9776;</button>
    </div>
  </nav>
  <main id="app"></main>
  <div class="dex-panel" id="dex-panel"></div>
  <div class="build-drawer" id="build-drawer">
    <div class="build-drawer-header">
      <span class="build-drawer-title">Build Output</span>
      <button class="build-drawer-close" onclick="document.getElementById('build-drawer').classList.remove('open'); const t=document.querySelector('.status-drawer-toggle'); if(t){t.innerHTML='&#9650;'; t.classList.remove('active');}">&times;</button>
    </div>
    <pre class="build-drawer-log"></pre>
  </div>
  <footer class="status-bar">
    <div class="status-progress"><div class="status-progress-fill"></div></div>
    <span class="status-project">--</span>
    <span class="status-sep">|</span>
    <span class="status-expansion">--</span>
    <span class="status-sep status-sep-lan">|</span>
    <span class="status-lan-url"></span>
    <span class="status-spacer"></span>
    <span class="status-torch-version">--</span>
    <span class="status-sep">|</span>
    <span class="status-build-indicator" style="cursor:pointer">
      <span class="status-dot status-dot-idle"></span>
      <span class="status-build-text">Ready</span>
    </span>
    <button class="status-dex-toggle" title="Toggle Dex reference">&#9733;</button>
    <button class="status-drawer-toggle" title="Toggle build output">&#9650;</button>
  </footer>
  <script type="module" src="app.js"></script>
</body>
</html>
